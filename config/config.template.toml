interval = 60            # 每次执行扫描同步的间隔时间，单位为秒。
max_concurrent_tasks = 3 # 同时进行的最大下载任务数，默认为3。不建议设置过多。
request_timeout = 300    # 请求同步信息的超时时间，单位为秒。
task_timeout = 600       # 单个下载任务执行的超时时间，单位为秒。
data_path = "config/"    # 保存程序运行数据的 sqlite 文件地址，避免重复下载。
log_level = "INFO"       # 日志级别，可选值: TRACE, DEBUG, INFO, SUCCESS, WARNING, ERROR, CRITICAL

[credential]
# 哔哩哔哩账号的身份凭据，请参考凭据获取[流程获取](https://nemo2011.github.io/bilibili-api/#/get-credential)
sessdata = "" # **必填项**
bili_jct = "" # **必填项**
# buvid3 = ""
# dedeuserid = ""
# ac_time_value = ""


# # 收藏夹同步
# [favorite_list.任务名]
# fid = 123                                      # 收藏夹id，必填项
# path = "temp_downloads/"                       # 下载存储路径，必填项
# name = "({bvid}){auto}"                        # 文件命名模版，选填项，默认为yutto原生模板 
# postprocess = [{ action = "move", fid = 345 }] # 后处理操作，选填项，默认为空列表
#
# 1. 支持设置任务名
# 2. 支持模板命名
# 2. 可以在下载后进行一些后处理操作
#    支持的操作：move (移动到其他收藏夹), remove (从收藏夹移除)
#
#
# ## 模板命名说明
# 最终文件保存的路径是 `path模版+name模版` 的组合
# 
# ### path 模板替换 (提供文件夹模板）
# 支持:
#   {YYYY}   四位数年份
#   {YY}     两位数年份
#   {MM}     两位数月份
#   {DD}     两位数日期
#   {HH}     两位数小时
#   {mm}     两位数分钟
#   {SS}     两位数秒数
# 示例：
# path = "downloads/{YYYY}{MM}"
# 
# ### name 模板替换 (提供文件命名的模板）（name当中也可以y用`/`设置子路径）
# 支持:
# yutto原生模板，参考 https://yutto.nyakku.moe/guide/cli/basic#%E5%AD%98%E6%94%BE%E5%AD%90%E8%B7%AF%E5%BE%84%E6%A8%A1%E6%9D%BF
# 示例：
# name = "{auto}({bvid})"

# ### 特殊示例：API接口的任务下载到"sync/"目录
# fid为-1用来表示通过API接口收到的下载任务
[favorite_list.task0]
fid = -1
path = "sync/"

# ### 示例1: 移动操作 - 将视频从收藏夹123移动到收藏夹345
[favorite_list.task1]
fid = 123
path = "temp_downloads/"
name = "({bvid}){auto}"
postprocess = [{ action = "move", fid = 345 }]

# ### 示例2: 移除操作 - 下载后从收藏夹456移除视频
[favorite_list.task2]
fid = 456
path = "downloads/"
name = "({bvid}){auto}"
postprocess = [{ action = "remove" }]
